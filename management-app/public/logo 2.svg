<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- Wine bottle -->
  <g filter="url(#shadow)">
    <!-- Bottle body -->
    <path d="M 75 50 L 75 140 Q 75 150 85 150 L 115 150 Q 125 150 125 140 L 125 50 Q 125 40 115 40 L 85 40 Q 75 40 75 50 Z" 
          fill="url(#bottleGradient)" stroke="#2C3E50" stroke-width="2"/>
    
    <!-- Bottle neck -->
    <rect x="90" y="40" width="20" height="15" fill="url(#bottleGradient)" stroke="#2C3E50" stroke-width="2"/>
    
    <!-- Cork -->
    <rect x="92" y="35" width="16" height="8" fill="#2C3E50" rx="2"/>
    
    <!-- Wine level -->
    <path d="M 80 100 Q 100 95 120 100 L 120 140 Q 120 150 115 150 L 85 150 Q 80 150 80 140 Z" 
          fill="#8B1D24" opacity="0.8"/>
    
    <!-- Management icon - gear/settings -->
    <g transform="translate(100, 85)">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#2C3E50" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="6" fill="#2C3E50"/>
      <rect x="-1" y="-8" width="2" height="4" fill="#2C3E50" rx="1"/>
      <rect x="-1" y="4" width="2" height="4" fill="#2C3E50" rx="1"/>
      <rect x="-8" y="-1" width="4" height="2" fill="#2C3E50" rx="1"/>
      <rect x="4" y="-1" width="4" height="2" fill="#2C3E50" rx="1"/>
      <rect x="-6" y="-6" width="2" height="3" fill="#2C3E50" rx="1" transform="rotate(-45)"/>
      <rect x="4" y="-6" width="2" height="3" fill="#2C3E50" rx="1" transform="rotate(45)"/>
      <rect x="-6" y="3" width="2" height="3" fill="#2C3E50" rx="1" transform="rotate(45)"/>
      <rect x="4" y="3" width="2" height="3" fill="#2C3E50" rx="1" transform="rotate(-45)"/>
    </g>
  </g>
  
  <!-- Text "wineME" -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="22" font-weight="bold" 
        fill="white" text-anchor="middle">wineME</text>
  <!-- Subtitle -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="12" 
        fill="#BDC3C7" text-anchor="middle">Management</text>
</svg>
